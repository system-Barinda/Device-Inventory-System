<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devices - Airtel Inventory</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f7fb}

/* NAVBAR */
.navbar{
  display:flex;justify-content:space-between;
  align-items:center;padding:15px 40px;background:white;
}

.nav-links a{margin:0 10px;text-decoration:none;color:#555}

.logout{
  background:#e74c3c;color:white;border:none;
  padding:8px 12px;border-radius:6px;cursor:pointer;
}

/* CONTAINER */
.container{padding:40px}

/* BUTTON */
.add-btn{
  background:#5b5be6;color:white;border:none;
  padding:10px 15px;border-radius:6px;
  margin-bottom:20px;cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th{background:#f1f1f1}

/* FORM MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:400px;
}

/* FORM */
.field{margin-bottom:10px}
.field input,.field select{
  width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;
}

.btn{
  width:100%;padding:10px;border:none;
  background:#5b5be6;color:white;border-radius:6px;cursor:pointer;
}

.action-btn{
  margin-right:5px;
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.edit{background:#3498db;color:white}
.delete{background:#e74c3c;color:white}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>Airtel Devices</b></div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="devices.html">Devices</a>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- CONTENT -->
<div class="container">

  <button class="add-btn" onclick="openForm()">+ Add Device</button>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Type</th>
        <th>Serial</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="deviceTable"></tbody>
  </table>

</div>

<!-- MODAL FORM -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="formTitle">Add Device</h3>

    <form id="deviceForm">
      <input type="hidden" id="deviceId">

      <div class="field">
        <input type="text" id="deviceName" placeholder="Device Name" required>
      </div>

      <div class="field">
        <select id="type">
          <option>Laptop</option>
          <option>Phone</option>
        </select>
      </div>

      <div class="field">
        <input type="text" id="serialNumber" placeholder="Serial">
      </div>

      <div class="field">
        <input type="text" id="brand" placeholder="Brand">
      </div>

      <div class="field">
        <input type="text" id="model" placeholder="Model">
      </div>

      <div class="field">
        <select id="status">
          <option>Available</option>
          <option>Assigned</option>
        </select>
      </div>

      <div class="field">
        <select id="conditionStatus">
          <option>Good</option>
          <option>Damaged</option>
        </select>
      </div>

      <div class="field">
        <input type="date" id="purchaseDate">
      </div>

      <button class="btn">Save</button>
    </form>

  </div>
</div>

<script>
// 🔐 PROTECT
if(!localStorage.getItem("user")){
  window.location.href="login.html";
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href="login.html";
}

// OPEN FORM
function openForm(device=null){
  document.getElementById("modal").style.display="flex";

  if(device){
    document.getElementById("formTitle").innerText="Edit Device";
    document.getElementById("deviceId").value=device.deviceId;
    document.getElementById("deviceName").value=device.deviceName;
    document.getElementById("type").value=device.type;
    document.getElementById("serialNumber").value=device.serialNumber;
    document.getElementById("brand").value=device.brand;
    document.getElementById("model").value=device.model;
    document.getElementById("status").value=device.status;
    document.getElementById("conditionStatus").value=device.conditionStatus;
    document.getElementById("purchaseDate").value=device.purchaseDate;
  }else{
    document.getElementById("formTitle").innerText="Add Device";
    document.getElementById("deviceForm").reset();
    document.getElementById("deviceId").value="";
  }
}

// CLOSE MODAL
window.onclick = function(e){
  if(e.target.classList.contains("modal")){
    document.getElementById("modal").style.display="none";
  }
}

// LOAD DEVICES
async function loadDevices(){
  const res = await fetch("http://localhost:8080/api/devices");
  const data = await res.json();

  const table = document.getElementById("deviceTable");
  table.innerHTML="";

  data.forEach(d=>{
    table.innerHTML += `
      <tr>
        <td>${d.deviceId}</td>
        <td>${d.deviceName}</td>
        <td>${d.type}</td>
        <td>${d.serialNumber}</td>
        <td>${d.status}</td>
        <td>
          <button class="action-btn edit" onclick='openForm(${JSON.stringify(d)})'>Edit</button>
          <button class="action-btn delete" onclick="deleteDevice(${d.deviceId})">Delete</button>
        </td>
      </tr>
    `;
  });
}

loadDevices();

// SAVE (ADD + EDIT)
document.getElementById("deviceForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const id = document.getElementById("deviceId").value;

  const data = {
    deviceName: document.getElementById("deviceName").value,
    type: document.getElementById("type").value,
    serialNumber: document.getElementById("serialNumber").value,
    brand: document.getElementById("brand").value,
    model: document.getElementById("model").value,
    status: document.getElementById("status").value,
    conditionStatus: document.getElementById("conditionStatus").value,
    purchaseDate: document.getElementById("purchaseDate").value
  };

  const url = id 
    ? `http://localhost:8080/api/devices/${id}`
    : "http://localhost:8080/api/devices";

  const method = id ? "PUT" : "POST";

  await fetch(url,{
    method:method,
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  document.getElementById("modal").style.display="none";
  loadDevices();
});

// DELETE
async function deleteDevice(id){
  if(confirm("Delete this device?")){
    await fetch(`http://localhost:8080/api/devices/${id}`,{
      method:"DELETE"
    });
    loadDevices();
  }
}
</script>

</body>
</html>
