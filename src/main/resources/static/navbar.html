<style>
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:bold;
  font-size:18px;
  color:#333;
}

.nav-links{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
}

.nav-links a{
  margin:0 10px;
  text-decoration:none;
  color:#555;
  font-size:14px;
}

.nav-links a.active{
  color:#5b5be6;
  font-weight:bold;
}

.logout-btn {
  background:#185FA5;
  color:white;
  padding:8px 16px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>

<div class="navbar">
  <div class="logo"><b>Airtel</b></div>

  <div class="nav-links">
    <a href="dashboard.html">Home</a>
    <a href="employees.html">Users</a>
    <a href="devices.html">Devices</a>
    <a href="assignment.html">Assignment</a>
    <a href="audit.html">Audit History</a>
    <a href="report.html">Reports</a>
  </div>

  <button type="button" class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<script>
  /**
   * ATTACH TO WINDOW OBJECT
   * This is the fix. By assigning the function to window.handleLogout, 
   * it becomes globally available even if the script execution is 
   * restricted by innerHTML injection.
   */
  window.handleLogout = async function() {
    console.log("Logout triggered...");

    try {
      // 1. Call Backend Logout API
      await fetch("/api/auth/logout", { 
          method: "POST",
          headers: { "Content-Type": "application/json" }
      });
    } catch (e) {
      console.warn("Backend logout unreachable, clearing local session anyway.");
    }

    // 2. Clear all credentials
    localStorage.clear();
    sessionStorage.clear();

    // 3. Redirect to login
    // replace() ensures they cannot click "Back" to return to the secured page
    window.location.replace("login.html");
  };

  // Immediate execution for active link styling
  (function() {
    const currentPage = window.location.pathname.split("/").pop() || "index.html";
    document.querySelectorAll(".nav-links a").forEach(link => {
      if(link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  })();
</script>
