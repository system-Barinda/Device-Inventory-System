<style>
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 1000;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.logo {
  font-weight: bold;
  font-size: 18px;
  color: #333;
}

.nav-links {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
}

.nav-links a {
  margin: 0 15px;
  text-decoration: none;
  color: #555;
  font-size: 14px;
  transition: color 0.3s;
}

.nav-links a.active {
  color: #185FA5;
  font-weight: bold;
  border-bottom: 2px solid #185FA5;
}

.logout-btn {
  background: #185FA5;
  color: white;
  padding: 8px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.3s;
}

.logout-btn:hover {
  background: #134a82;
}
</style>

<div class="navbar">
  <div class="logo"><b>Airtel</b></div>

  <div class="nav-links">
    <a href="dashboard.html">Home</a>
    <a href="employees.html">Users</a>
    <a href="devices.html">Devices</a>
    <a href="assignment.html">Assignment</a>
    <a href="audit.html">Audit History</a>
    <a href="report.html">Reports</a>
  </div>

  <button type="button" id="main-logout-btn" class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<script>
  // Use a self-executing function to avoid conflicts
  (function() {
    
    // 1. Define the logout logic
    const performLogout = async function() {
      console.log("Logging out...");

      try {
        // Attempt to notify the backend
        await fetch("/api/auth/logout", { 
            method: "POST",
            headers: { "Content-Type": "application/json" }
        });
      } catch (e) {
        console.log("Proceeding with local logout only.");
      }

      // Clear everything
      localStorage.clear();
      sessionStorage.clear();

      // Redirect
      window.location.replace("login.html");
    };

    // 2. Attach to window so onclick="handleLogout()" still works
    window.handleLogout = performLogout;

    // 3. Fallback: Manually attach event listener in case onclick is blocked
    const btn = document.getElementById('main-logout-btn');
    if (btn) {
      btn.addEventListener('click', performLogout);
    }

    // 4. Active Link Logic
    const currentPage = window.location.pathname.split("/").pop() || "dashboard.html";
    document.querySelectorAll(".nav-links a").forEach(link => {
      if(link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });

  })();
</script>
