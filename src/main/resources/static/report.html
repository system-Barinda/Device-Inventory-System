<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Report - Airtel Inventory</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}
body{
background:linear-gradient(120deg,#c6d8ff,#e6c9ff);
}

.report{
  max-width:950px;
  margin:40px auto;
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom: 2px solid #f4f7fb;
  padding-bottom: 20px;
  margin-bottom: 20px;
}

.title h1{ font-size:32px; color:#185FA5; letter-spacing: 1px; }
.title h2{ font-size:18px; color: #555; text-align: right; }

.actions{ margin-top:20px; display:flex; gap:12px; }

button.btn-action{
  padding:10px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight: bold;
  transition: opacity 0.2s;
}

button.btn-action:hover{ opacity: 0.8; }

.print{background:#333;color:white}
.pdf{background:#e74c3c;color:white}
.excel{background:#27ae60;color:white}

table{ width:100%; margin-top:25px; border-collapse:collapse; }
th, td{ padding:12px; border-bottom:1px solid #eee; text-align: left; }
th{background:#f8f9fa; color: #333;}

.assigned{color:#27ae60; font-weight: bold;}
.returned{color:#f39c12; font-weight: bold;}
.updated{color:#3498db; font-weight: bold;}

.footer{ margin-top:30px; text-align:right; font-size:12px; color:#aaa; }

@media print{
  .actions, #navbar-container, button{display:none !important}
  .report{box-shadow: none; margin: 0; width: 100%; max-width: 100%;}
  body{background:white}
}
</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="report" id="reportContent">
  <div class="header">
    <div>
      <b style="color: #e11919; font-size: 20px;">Airtel</b><br>
      <span style="color: #666;">Inventory Management System</span>
    </div>
    <div class="title">
      <h1>DAILY</h1>
      <h2>ACTIVITY REPORT</h2>
    </div>
  </div>

  <p style="color:#666; font-size: 14px;">
    Comprehensive log of device movements including assignments, returns, and system audits.
  </p>

  <div class="actions">
    <button class="btn-action print" onclick="window.print()">Print Report</button>
    <button class="btn-action pdf" onclick="downloadPDF()">Export PDF</button>
    <button class="btn-action excel" onclick="downloadExcel()">Export CSV</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Device Name</th>
        <th>Employee / User</th>
        <th>Action Performed</th>
      </tr>
    </thead>
    <tbody id="reportTable">
        <tr><td colspan="4">Fetching latest logs...</td></tr>
    </tbody>
  </table>

  <div class="footer">
    Report generated on: <span id="dateNow"></span>
  </div>
</div>

<script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

const currentHost = window.location.hostname;
const API_BASE = `http://${currentHost}:8080/api`;

/**
 * 1. AUTH CHECK
 */
if(!localStorage.getItem("user")){
  window.location.replace("login.html");
}

/**
 * LOGOUT FIX (Added here because navbar scripts are blocked)
 */
window.handleLogout = async function() {
    console.log("Logout triggered from Report page...");
    try {
      await fetch(`${API_BASE}/auth/logout`, { 
          method: "POST",
          headers: { "Content-Type": "application/json" }
      });
    } catch (e) {
      console.warn("Backend unreachable, clearing local session.");
    }
    localStorage.clear();
    sessionStorage.clear();
    window.location.replace("login.html");
};

/**
 * 2. LOAD NAVBAR
 */
async function loadNavbar(){
  try {
    const res = await fetch("navbar.html");
    document.getElementById("navbar-container").innerHTML = await res.text();
  } catch (e) { console.error("Navbar fail", e); }
}

/**
 * 3. DATE
 */
document.getElementById("dateNow").innerText = new Date().toLocaleString();

/**
 * 4. LOAD REPORT DATA
 */
async function loadReport(){
  const table = document.getElementById("reportTable");

  try {
    const res = await fetch(`${API_BASE}/audit`, {
      method: "GET",
      credentials: "include"
    });

    if(!res.ok){ throw new Error("Failed with status " + res.status); }

    const data = await res.json();
    table.innerHTML = "";

    if(!Array.isArray(data) || data.length === 0){
      table.innerHTML = "<tr><td colspan='4'>No activity found.</td></tr>";
      return;
    }

    data.reverse().forEach(a => {
      const action = (a.action || "").toLowerCase();
      let className = "";
      if(action.includes("assign")) className = "assigned";
      else if(action.includes("return")) className = "returned";
      else className = "updated";

      table.innerHTML += `
        <tr>
          <td>${a.timestamp ? new Date(a.timestamp).toLocaleString() : "---"}</td>
          <td>${a.deviceName || a.device?.deviceName || "Unknown Device"}</td>
          <td>${a.userName || a.user?.fullName || "System"}</td>
          <td class="${className}">${a.action || "Updated"}</td>
        </tr>
      `;
    });

  } catch(e){
    console.error("Report error:", e);
    table.innerHTML = `<tr><td colspan="4" style="color:red;text-align:center;">Failed to load report.</td></tr>`;
  }
}

/**
 * 5. EXPORT PDF
 */
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text("Airtel Inventory Report", 14, 20);
  let y = 30;
  document.querySelectorAll("#reportTable tr").forEach(row => {
    const cols = row.querySelectorAll("td");
    if(cols.length > 1){
      const line = `${cols[0].innerText} | ${cols[1].innerText} | ${cols[2].innerText} | ${cols[3].innerText}`;
      doc.text(line.substring(0, 90), 14, y);
      y += 8;
      if(y > 280){ doc.addPage(); y = 20; }
    }
  });
  doc.save("Airtel_Report.pdf");
}

/**
 * 6. EXPORT CSV
 */
function downloadExcel(){
  let csv = "Date,Device,User,Action\n";
  document.querySelectorAll("#reportTable tr").forEach(row=>{
    const cols = row.querySelectorAll("td");
    if(cols.length > 1){
      let rowData = Array.from(cols).map(c => `"${c.innerText}"`);
      csv += rowData.join(",") + "\n";
    }
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Airtel_Report.csv";
  link.click();
}

/**
 * 7. INIT
 */
loadNavbar();
loadReport();

/**
 * 8. GLOBAL EXPORT FUNCTIONS
 */
window.downloadPDF = downloadPDF;
window.downloadExcel = downloadExcel;

});
</script>

</body>
</html>
