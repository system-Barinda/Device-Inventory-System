<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtel Inventory - Login</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}

/* BACKGROUND */
body{
  background:#f4f7fb;
}

/* WRAPPER */
.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  width:100%;
  max-width:420px;
  padding:2rem;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* BRAND */
.brand{text-align:center;margin-bottom:1.5rem}
.brand-dot{
  width:40px;height:40px;background:#185FA5;
  border-radius:10px;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center
}
.brand-dot svg{width:22px;height:22px;fill:#fff}
.brand-name{font-size:16px;font-weight:600;color:#111}
.brand-sub{font-size:12px;color:#666;margin-top:3px}

/* TABS */
.tabs{
  display:flex;
  border:1px solid #e5e7eb;
  border-radius:8px;
  margin-bottom:1.5rem;
  overflow:hidden;
}
.tab{
  flex:1;
  padding:10px;
  font-size:13px;
  cursor:pointer;
  border:none;
  background:#f3f4f6;
  color:#555;
  transition:0.2s;
}
.tab.active{
  background:#fff;
  color:#111;
  font-weight:600;
}

/* FORM */
.form-section{display:none}
.form-section.active{display:block}

.field{margin-bottom:1rem}
.field label{
  font-size:12px;
  color:#555;
  margin-bottom:5px;
  display:block;
}

.field input,.field select{
  width:100%;
  padding:10px;
  font-size:13px;
  border:1px solid #d1d5db;
  border-radius:8px;
  background:#fff;
  transition:0.2s;
}

.field input:focus,.field select:focus{
  outline:none;
  border-color:#185FA5;
  box-shadow:0 0 0 2px rgba(24,95,165,0.15);
}

/* GRID */
.field-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BUTTON */
.btn-submit{
  width:100%;
  padding:11px;
  font-size:14px;
  font-weight:600;
  background:#185FA5;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.btn-submit:hover{background:#0C447C}

/* DIVIDER */
.divider{
  text-align:center;
  font-size:12px;
  color:#777;
  margin:1rem 0;
  position:relative;
}
.divider::before{
  content:'';
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:1px;
  background:#e5e7eb;
}
.divider span{
  background:#fff;
  padding:0 10px;
  position:relative;
}

/* MESSAGE */
.msg{
  font-size:12px;
  text-align:center;
  margin-top:1rem;
  padding:8px;
  border-radius:8px;
  display:none;
}
.msg.success{background:#e6f7ee;color:#1b7a4b;display:block}
.msg.error{background:#fdecea;color:#b42318;display:block}

/* RESPONSIVE */
@media (max-width:480px){
  .card{padding:1.5rem}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <!-- BRAND -->
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 20 20">
          <rect x="2" y="2" width="7" height="7" rx="1"/>
          <rect x="11" y="2" width="7" height="7" rx="1"/>
          <rect x="2" y="11" width="7" height="7" rx="1"/>
          <rect x="11" y="11" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div class="brand-name">Airtel Inventory</div>
      <div class="brand-sub">Device Management System</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login',this)">Sign in</button>
      <button class="tab" onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="sec-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@airtel.rw">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password">
      </div>

      <button class="btn-submit" onclick="handleLogin()">Sign in</button>
      <div class="msg" id="login-msg"></div>

      <div class="divider"><span>or</span></div>

      <p style="text-align:center;font-size:12px;color:#666">
        No account?
        <span style="color:#185FA5;cursor:pointer" onclick="switchTabByName('register')">Register</span>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="sec-register">

      <div class="field">
        <label>Full name</label>
        <input type="text" id="reg-fullname">
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Department</label>
          <select id="reg-department">
            <option value="">Select...</option>
            <option>IT</option>
            <option>Sales</option>
            <option>Finance</option>
            <option>HR</option>
          </select>
        </div>

        <div class="field">
          <label>Role</label>
          <select id="reg-role">
            <option value="">Select...</option>
            <option>Admin</option>
            <option>Staff</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password">
      </div>

      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="reg-confirm">
      </div>

      <button class="btn-submit" onclick="handleRegister()">Create account</button>
      <div class="msg" id="register-msg"></div>

    </div>
  </div>
</div>

<script>
function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sec-'+name).classList.add('active');
}

function switchTabByName(name){
  const tabs=document.querySelectorAll('.tab');
  tabs.forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  const idx=name==='login'?0:1;
  tabs[idx].classList.add('active');
  document.getElementById('sec-'+name).classList.add('active');
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='msg '+type;
}

async function handleLogin(){
	  const email = document.getElementById('login-email').value.trim();
	  const password = document.getElementById('login-password').value;

	  if(!email || !password){
	    showMsg('login-msg','Fill all fields','error');
	    return;
	  }

	  try{
	    const res = await fetch('http://localhost:8080/api/auth/login',{
	      method:'POST',
	      headers:{'Content-Type':'application/json'},
	      body: JSON.stringify({email, password})
	    });

	    if(res.ok){
	      const data = await res.json();

	      // ✅ SAVE SESSION
	      localStorage.setItem("user", JSON.stringify(data));

	      showMsg('login-msg','Login successful','success');

	      setTimeout(()=>{
	        window.location.href = "dashboard.html";
	      },1000);

	    }else{
	      showMsg('login-msg','Invalid credentials','error');
	    }

	  }catch{
	    showMsg('login-msg','Server error','error');
	  }
	}

async function handleRegister(){
  const fullName=document.getElementById('reg-fullname').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const department=document.getElementById('reg-department').value;
  const role=document.getElementById('reg-role').value;
  const password=document.getElementById('reg-password').value;
  const confirm=document.getElementById('reg-confirm').value;

  if(!fullName||!email||!department||!role||!password){
    showMsg('register-msg','Fill all fields','error');return;
  }

  if(password!==confirm){
    showMsg('register-msg','Passwords mismatch','error');return;
  }

  try{
    const res=await fetch('http://localhost:8080/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fullName,email,department,role,password})
    });

    if(res.ok){
      showMsg('register-msg','Account created','success');
      setTimeout(()=>switchTabByName('login'),1500);
    }else{
      showMsg('register-msg','Registration failed','error');
    }
  }catch{
    showMsg('register-msg','Server error','error');
  }
}
</script>

</body>
</html>
