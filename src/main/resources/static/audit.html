<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit History - Airtel Inventory</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}
body{background:#f4f7fb}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

.select-box{margin-bottom:20px}

select{
  width:100%;
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size: 16px;
  background: white;
}

.timeline{
  position:relative;
  margin-top:20px;
  min-height: 200px;
}

.timeline::before{
  content:'';
  position:absolute;
  left:20px;
  width:4px;
  height:100%;
  background:#5b5be6;
}

.timeline-item{
  position:relative;
  margin-bottom:20px;
  padding-left:50px;
}

.timeline-item::before{
  content:'';
  position:absolute;
  left:12px;
  top:15px;
  width:18px;
  height:18px;
  background:#5b5be6;
  border-radius:50%;
  border: 3px solid #f4f7fb;
  z-index: 2;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.date{
  font-size:12px;
  color:#999;
  margin-bottom: 5px;
}

.status{
  font-weight:bold;
  text-transform: uppercase;
  font-size: 14px;
}

.assigned{color:#27ae60}
.returned{color:#f39c12}
.updated{color:#5b5be6}

.error-msg {
    color: #e74c3c;
    background: #fdf2f2;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}
</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="container">
  <h2 style="margin-bottom: 20px;">Device Audit History</h2>

  <div class="select-box">
    <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">Select an item to track its movement:</label>
    <select id="deviceSelect">
        <option value="">Fetching devices...</option>
    </select>
  </div>

  <div class="timeline" id="timeline"></div>
</div>

<script>
/**
 * 1. AUTH & NAVBAR
 */
if(!localStorage.getItem("user")){
  window.location.replace("login.html");
}

async function loadNavbar(){
  try {
    const res = await fetch("navbar.html");
    const data = await res.text();
    const container = document.getElementById("navbar-container");
    container.innerHTML = data;

    window.handleLogout = async function() {
      try { 
          await fetch("http://localhost:8080/api/auth/logout", { 
              method: "POST",
              credentials: 'include' 
          }); 
      } catch (e) {}
      localStorage.clear();
      window.location.replace("login.html");
    };

    const scripts = container.querySelectorAll("script");
    scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        newScript.text = oldScript.text;
        document.head.appendChild(newScript).parentNode.removeChild(newScript);
    });
  } catch(e) { console.error("Navbar error"); }
}

/**
 * 2. LOAD DEVICES
 */
async function loadDevices(){
  const select = document.getElementById("deviceSelect");

  try{
    // Added credentials: 'include' to pass session cookies
    const res = await fetch("http://localhost:8080/api/devices", {
        headers: { "Accept": "application/json" },
        credentials: 'include'
    });
    
    const contentType = res.headers.get("content-type");
    if (!res.ok || !contentType || !contentType.includes("application/json")) {
        throw new Error("Unauthorized");
    }

    const devices = await res.json();
    select.innerHTML = "<option value=''>-- Choose a Device --</option>";

    devices.forEach(d => {
      select.innerHTML += `<option value="${d.deviceId}">${d.deviceName} (${d.serialNumber || 'No Serial'})</option>`;
    });

  }catch(e){
    select.innerHTML = "<option>Error: Please log in again</option>";
    console.error("Device Load Error:", e);
  }
}

/**
 * 3. LOAD TIMELINE
 */
async function loadTimeline(deviceId){
  const timeline = document.getElementById("timeline");
  if(!deviceId){ timeline.innerHTML = ""; return; }

  timeline.innerHTML = "<p style='text-align:center; padding: 20px;'>Loading history...</p>";

  try{
    const res = await fetch(`http://localhost:8080/api/audit/device/${deviceId}`, {
        headers: { "Accept": "application/json" },
        credentials: 'include'
    });
    
    const contentType = res.headers.get("content-type");
    if (!res.ok || !contentType || !contentType.includes("application/json")) {
        throw new Error("Session Expired");
    }

    const data = await res.json();
    data.sort((a,b)=> new Date(b.actionDate) - new Date(a.actionDate));

    timeline.innerHTML = "";

    if(data.length === 0){
      timeline.innerHTML = "<div class='card' style='text-align:center;'>No history found for this device.</div>";
      return;
    }

    data.forEach(a => {
      let statusClass = "updated";
      const actionText = a.action ? a.action.toLowerCase() : "";
      if(actionText.includes("assign")) statusClass = "assigned";
      if(actionText.includes("return")) statusClass = "returned";

      // Fixed: firstName and lastName are properties of the employee object
      const user = a.employee ? `${a.employee.firstName} ${a.employee.lastName || ""}` : "System Admin";

      timeline.innerHTML += `
        <div class="timeline-item">
          <div class="card">
            <div class="date">${new Date(a.actionDate).toLocaleString()}</div>
            <div class="status ${statusClass}">${a.action}</div>
            <div style="font-size:14px; color:#444; margin-top:8px; border-top: 1px solid #eee; padding-top: 5px;">
              <b>Performed by:</b> ${user}
            </div>
          </div>
        </div>
      `;
    });

  } catch(e) {
    timeline.innerHTML = `<div class='error-msg'>
        <b>Connection Error</b><br>
        Your session may have expired. 
        Please try logging out and back in.
    </div>`;
  }
}

// Listeners
document.getElementById("deviceSelect").addEventListener("change", function(){
  loadTimeline(this.value);
});

// Init
loadNavbar();
loadDevices();
</script>

</body>
</html>
