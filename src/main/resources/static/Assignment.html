<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Assignment - Airtel Inventory</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', Arial, sans-serif}
body{background:#f4f7fb; color: #333;}

/* CONTAINER */
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* RESPONSIVE GRID LAYOUT */
.layout-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

@media (min-width: 850px) {
    .layout-grid {
        grid-template-columns: 350px 1fr; /* Sidebar for form, wide area for table */
    }
}

/* CARD & TABLE CONTAINER */
.card, .table-container {
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
}

.card h2, .table-container h2 {
  margin-bottom: 20px;
  font-size: 1.25rem;
  color: #185FA5;
}

/* FORM STYLING */
.field{margin-bottom:15px}
.field label{
  font-size:13px;
  display:block;
  margin-bottom:6px;
  font-weight: 600;
  color: #555;
}

.field select {
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  background: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.field select:focus {
    border-color: #185FA5;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  background:#185FA5;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight: bold;
  font-size: 15px;
  transition: background 0.3s;
}

.btn:hover{background:#124a82}
.btn:disabled{ background:#aaa; cursor:not-allowed; }

.msg{
  margin-top:15px;
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
  text-align:center;
  display: none;
}

/* TABLE STYLING */
.table-wrapper {
  overflow-x: auto; /* Handles small screens */
}

table{
  width:100%;
  border-collapse:collapse;
  min-width: 500px;
}

th, td{
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size: 14px;
}

th{
  background:#f8f9fa;
  color:#666;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* STATUS BADGES */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight: bold;
  display:inline-block;
}

.assigned{background:#e6fcf5; color:#0ca678}
.returned{background:#fff4e6; color:#f76707}
.maintenance{background:#fff0f0; color:#fa5252}

</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="container">
  <div class="layout-grid">
    
    <div class="card">
      <h2>Assign Device</h2>
      <form id="assignForm">
        <div class="field">
          <label>Select Available Device</label>
          <select id="deviceId" required>
              <option value="">Loading devices...</option>
          </select>
        </div>

        <div class="field">
          <label>Assign To Employee</label>
          <select id="employeeId" required>
              <option value="">Loading employees...</option>
          </select>
        </div>

        <button type="submit" class="btn" id="assignBtn">Confirm Assignment</button>
      </form>
      <div class="msg" id="msg"></div>
    </div>

    <div class="table-container">
      <h2>Recent Assignments</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Employee</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="assignmentTable">
              <tr><td colspan="4" style="text-align:center;">Loading records...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
/**
 * 1. CONFIG & AUTH
 */
const currentHost = window.location.hostname;
const API_BASE = `http://${currentHost}:8080/api`;

if(!localStorage.getItem("user")){
  window.location.replace("login.html");
}

/**
 * 2. LOAD NAVBAR
 */
async function loadNavbar(){
  try {
    const res = await fetch("navbar.html");
    const data = await res.text();
    document.getElementById("navbar-container").innerHTML = data;
  } catch (e) { console.error("Navbar failed"); }
}

/**
 * 3. DATA FETCHING
 */
async function loadDevices(){
  const select = document.getElementById("deviceId");
  try{
    // Fetches only devices where status = 'Available'
    const res = await fetch(`${API_BASE}/devices`, { credentials: 'include' });
    const allDevices = await res.json();
    
    // Filter available devices on frontend if backend endpoint is generic
    const available = allDevices.filter(d => d.status === "Available");
    
    select.innerHTML = "<option value=''>-- Select Device --</option>";
    if(available.length === 0) {
        select.innerHTML = "<option value=''>No devices available</option>";
    } else {
        available.forEach(d => {
            select.innerHTML += `<option value="${d.deviceId}">${d.deviceName} [${d.serialNumber || 'No SN'}]</option>`;
        });
    }
  } catch(e) {
    select.innerHTML = "<option>Error connecting to server</option>";
  }
}

async function loadEmployees(){
  const select = document.getElementById("employeeId");
  try{
    const res = await fetch(`${API_BASE}/auth/users`, { credentials: 'include' });
    const employees = await res.json();
    select.innerHTML = "<option value=''>-- Select Staff --</option>";
    employees.forEach(e => {
      select.innerHTML += `<option value="${e.userId}">${e.fullName} (${e.department})</option>`;
    });
  } catch(e) {
    select.innerHTML = "<option>Error loading users</option>";
  }
}

async function loadAssignments(){
  const table = document.getElementById("assignmentTable");
  try{
    const res = await fetch(`${API_BASE}/assignments`, { credentials: 'include' });
    if(res.status === 401) throw new Error("Unauthorized");
    
    const data = await res.json();
    table.innerHTML = "";
    
    if(data.length === 0) {
        table.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No active assignments found.</td></tr>";
        return;
    }

    data.reverse().forEach(a => {
      const status = a.status || "Assigned";
      const statusClass = status.toLowerCase();
      table.innerHTML += `
        <tr>
          <td><b>${a.device?.deviceName || "Unknown"}</b></td>
          <td>${a.user?.fullName || "N/A"}</td>
          <td>${a.assignedDate ? new Date(a.assignedDate).toLocaleDateString() : "---"}</td>
          <td><span class="status ${statusClass}">${status}</span></td>
        </tr>
      `;
    });
  } catch(e) {
    table.innerHTML = "<tr><td colspan='4' style='color:red; text-align:center;'>Session expired. Please reload.</td></tr>";
  }
}

/**
 * 4. FORM LOGIC
 */
document.getElementById("assignForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const deviceId = document.getElementById("deviceId").value;
  const userId = document.getElementById("employeeId").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("assignBtn");

  if(!deviceId || !userId) return;

  btn.disabled = true;
  msg.style.display = "block";
  msg.style.background = "#e7f5ff";
  msg.style.color = "#185FA5";
  msg.innerText = "Processing...";

  try {
    // Note: Adjust this URL to match your backend @PostMapping precisely
    const res = await fetch(`${API_BASE}/assignments/assign/${deviceId}/${userId}`, { 
        method: "POST",
        credentials: 'include'
    });

    if(res.ok) {
      msg.style.background = "#e6fcf5";
      msg.style.color = "#0ca678";
      msg.innerText = "✅ Assignment Successful!";
      this.reset();
      
      // Refresh both to show new list and update available devices
      setTimeout(() => {
          msg.style.display = "none";
          loadDevices();
          loadAssignments();
      }, 2000);
    } else {
      throw new Error();
    }
  } catch(e) {
    msg.style.background = "#fff0f0";
    msg.style.color = "#fa5252";
    msg.innerText = "❌ Failed. Device might be already assigned.";
  } finally {
    btn.disabled = false;
  }
});

// Start
loadNavbar();
loadDevices();
loadEmployees();
loadAssignments();
</script>

</body>
</html>
