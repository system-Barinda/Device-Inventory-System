<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtel Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:#f4f7fb;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 40px;
  background:linear-gradient(120deg,#c6d8ff,#e6c9ff);
}

.hero-text{max-width:500px}

.badge{
  background:#5b5be6;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:15px;
  display:inline-block;
}

.hero-text h1{font-size:32px;margin-bottom:15px;color:#222}
.hero-text p{color:#555;font-size:14px;margin-bottom:20px}

.cta{
  background:#5b5be6;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
}

/* RIGHT */
.mock-card{
  width:260px;
  height:auto;
  background:white;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  padding:20px;
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:conic-gradient(#ff7a18 0% 40%, #4facfe 40% 70%, #43e97b 70%);
  margin:15px auto;
}

/* NEW STATS LIST */
.stats{
  margin-top:15px;
}

.stat{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:14px;
}

.stat span{
  font-weight:bold;
  color:#5b5be6;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="hero">
  <div class="hero-text">
    <div class="badge">Dashboard</div>
    <h1 id="welcome-user">Welcome</h1>
    <p>Monitor users, devices, and activities in one smart dashboard.</p>
    <button class="cta">Explore System</button>
  </div>

  <div class="hero-image">
    <div class="mock-card">
      <h4 style="text-align:center;margin-bottom:10px;">System Statistics</h4>

      <div class="circle"></div>

      <div class="stats">
        <div class="stat">Users <span id="users-count">0</span></div>
        <div class="stat">Devices <span id="devices-count">0</span></div>
        <div class="stat">Active <span id="active-count">0</span></div>
        <div class="stat">Available <span id="available-count">0</span></div>
      </div>

    </div>
  </div>
</div>

<div id="footer-container"></div>

<script>
// AUTH CHECK
const userStr = localStorage.getItem("user");
if(!userStr){
  window.location.href = "login.html";
}

const userData = JSON.parse(userStr);
document.getElementById("welcome-user").innerText = "Welcome " + (userData.fullName || "User");

/**
 * LOGOUT FIX (Ensures navbar button works)
 */
window.handleLogout = async function() {
    console.log("Logging out from Dashboard...");
    try {
      // Notify backend if possible
      await fetch("/api/auth/logout", { 
          method: "POST",
          headers: { "Content-Type": "application/json" }
      });
    } catch (e) {
      console.warn("Backend unreachable, clearing local data.");
    }
    
    // Clear all session data
    localStorage.clear();
    sessionStorage.clear();
    
    // Redirect to login
    window.location.replace("login.html");
};

// LOAD USERS
async function loadUsers(){
  try{
    const res = await fetch("/api/auth/users"); 
    if(res.ok){
        const data = await res.json();
        document.getElementById("users-count").innerText = data.length;
    }
  } catch(e) {
    console.error("Error loading users", e);
  }
}

// LOAD DEVICES
async function loadDevices(){
  try{
    const res = await fetch("/api/devices"); 
    if(res.ok){
        const data = await res.json();
        document.getElementById("devices-count").innerText = data.length;
        
        const active = data.filter(d => d.status === "Assigned" || d.status === "Active");
        document.getElementById("active-count").innerText = active.length;

        const available = data.filter(d => d.status === "Available");
        document.getElementById("available-count").innerText = available.length;
    }
  } catch(e) {
    console.error("Error loading devices", e);
  }
}

// NAVBAR & FOOTER
async function loadNavbar(){
  try {
    const res = await fetch("navbar.html");
    if(res.ok) {
        document.getElementById("navbar-container").innerHTML = await res.text();
    }
  } catch(e) {}
}

async function loadFooter(){
  try{
    const res = await fetch("footer.html");
    if(res.ok) {
        document.getElementById("footer-container").innerHTML = await res.text();
    }
  } catch(e) {}
}

// INIT
loadNavbar();
loadFooter();
loadUsers();
loadDevices();

// Local fallback logout (if needed for internal buttons)
function logout(){
  window.handleLogout();
}
</script>

</body>
</html>
