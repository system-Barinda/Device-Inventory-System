<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtel Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:#f4f7fb;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 40px;
  background:linear-gradient(120deg,#c6d8ff,#e6c9ff);
}

.hero-text{max-width:500px}

.badge{
  background:#5b5be6;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:15px;
  display:inline-block;
}

.hero-text h1{font-size:32px;margin-bottom:15px;color:#222}
.hero-text p{color:#555;font-size:14px;margin-bottom:20px}

.cta{
  background:#5b5be6;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
}

/* RIGHT */
.mock-card{
  width:220px;
  height:420px;
  background:white;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  padding:20px;
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:conic-gradient(#ff7a18 0% 40%, #4facfe 40% 70%, #43e97b 70%);
  margin:auto;
}

/* CARDS */
.cards{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.card h4{color:#555;margin-bottom:10px}
.card p{font-size:22px;font-weight:bold;color:#5b5be6}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div id="navbar-container"></div>

<div class="hero">
  <div class="hero-text">
    <div class="badge">Dashboard</div>
    <h1 id="welcome-user">Welcome</h1>
    <p>Monitor users, devices, and activities in one smart dashboard.</p>
    <button class="cta">Explore System</button>
  </div>

  <div class="hero-image">
    <div class="mock-card">
      <h4 style="text-align:center;margin-bottom:20px;">Statistics</h4>
      <div class="circle"></div>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script>
/** * 1. AUTH CHECK 
 * We check this immediately before the page even finishes loading
 */
const userStr = localStorage.getItem("user");
if(!userStr){
  window.location.href = "login.html";
}

// Display user name safely
const userData = JSON.parse(userStr);
document.getElementById("welcome-user").innerText = "Welcome " + (userData.fullName || "User");

/**
 * 2. API CALLS
 * We use relative paths now since your SecurityConfig permits them
 */

async function loadUsers(){
  try{
    // Changed to match your UserController @RequestMapping
    const res = await fetch("/api/auth/users"); 
    if(res.ok){
        const data = await res.json();
        document.getElementById("users-count").innerText = data.length;
    }
  } catch(e) {
    console.error("Error loading users", e);
  }
}

async function loadDevices(){
  try{
    // Ensure this matches your DeviceController path
    const res = await fetch("/api/devices"); 
    if(res.ok){
        const data = await res.json();
        document.getElementById("devices-count").innerText = data.length;
        
        // Count devices that are actually in use
        const active = data.filter(d => d.status === "Assigned" || d.status === "Active");
        document.getElementById("active-count").innerText = active.length;
    }
  } catch(e) {
    console.error("Error loading devices", e);
  }
}

// 3. UI COMPONENT LOADERS
async function loadNavbar(){
  try {
    const res = await fetch("navbar.html");
    if(res.ok) {
        const data = await res.text();
        document.getElementById("navbar-container").innerHTML = data;
    }
  } catch(e) {}
}

async function loadFooter(){
  try{
    const res = await fetch("footer.html");
    if(res.ok) {
        const data = await res.text();
        document.getElementById("footer-container").innerHTML = data;
    }
  } catch(e) {}
}

// Initializing page
loadNavbar();
loadFooter();
loadUsers();
loadDevices();

// 4. LOGOUT FUNCTION
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

</body>
</html>
