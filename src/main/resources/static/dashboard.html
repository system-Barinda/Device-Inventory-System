<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airtel Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:#f4f7fb;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}


/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 40px;
  background:linear-gradient(120deg,#c6d8ff,#e6c9ff);
}

.hero-text{max-width:500px}

.badge{
  background:#5b5be6;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:15px;
  display:inline-block;
}

.hero-text h1{font-size:32px;margin-bottom:15px;color:#222}
.hero-text p{color:#555;font-size:14px;margin-bottom:20px}

.cta{
  background:#5b5be6;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:25px;
  cursor:pointer;
}

/* RIGHT */
.mock-card{
  width:220px;
  height:420px;
  background:white;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  padding:20px;
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:conic-gradient(#ff7a18 0% 40%, #4facfe 40% 70%, #43e97b 70%);
  margin:auto;
}

/* CARDS */
.cards{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.card h4{color:#555;margin-bottom:10px}
.card p{font-size:22px;font-weight:bold;color:#5b5be6}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR LOAD HERE -->
<div id="navbar-container"></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <div class="badge">Dashboard</div>
    <h1 id="welcome-user">Welcome</h1>
    <p>Monitor users, devices, and activities in one smart dashboard.</p>
    <button class="cta">Explore System</button>
  </div>

  <div class="hero-image">
    <div class="mock-card">
      <h4 style="text-align:center;margin-bottom:20px;">Statistics</h4>
      <div class="circle"></div>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="cards">
  <div class="card">
    <h4>Total Users</h4>
    <p id="users-count">0</p>
  </div>
  <div class="card">
    <h4>Total Devices</h4>
    <p id="devices-count">0</p>
  </div>
  <div class="card">
    <h4>Active Devices</h4>
    <p id="active-count">0</p>
  </div>
  <div class="card">
    <h4>Departments</h4>
    <p>5</p>
  </div>
</div>

<!-- FOOTER -->
<div id="footer-container"></div>

<script>
// ✅ AUTH CHECK
const user = localStorage.getItem("user");

if(!user){
  window.location.href = "login.html";
}

// ✅ USER NAME
const userData = JSON.parse(user);
document.getElementById("welcome-user").innerText =
  "Welcome " + userData.fullName;

// ✅ LOAD NAVBAR
async function loadNavbar(){
  const res = await fetch("navbar.html");
  const data = await res.text();
  document.getElementById("navbar-container").innerHTML = data;
}
loadNavbar();

// ✅ LOAD USERS
async function loadUsers(){
  try{
    const res = await fetch("http://localhost:8080/api/users");
    const data = await res.json();
    document.getElementById("users-count").innerText = data.length;
  }catch{
    console.log("Error loading users");
  }
}

// ✅ LOAD DEVICES
async function loadDevices(){
  try{
    const res = await fetch("http://localhost:8080/api/devices");
    const data = await res.json();

    document.getElementById("devices-count").innerText = data.length;

    const active = data.filter(d => d.status === "Assigned");
    document.getElementById("active-count").innerText = active.length;

  }catch{
    console.log("Error loading devices");
  }
}

loadUsers();
loadDevices();

// ✅ LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

// ✅ FOOTER
async function loadFooter(){
  try{
    const res = await fetch("footer.html");
    const data = await res.text();
    document.getElementById("footer-container").innerHTML = data;
  }catch{
    console.log("Footer not loaded");
  }
}
loadFooter();
</script>

</body>
</html>
