
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{background:var(--color-background-tertiary);min-height:600px;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);width:100%;max-width:420px;padding:2rem}
.brand{text-align:center;margin-bottom:1.75rem}
.brand-dot{width:36px;height:36px;background:#185FA5;border-radius:var(--border-radius-md);margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.brand-dot svg{width:20px;height:20px;fill:#fff}
.brand-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.brand-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.tabs{display:flex;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:1.5rem;overflow:hidden}
.tab{flex:1;padding:8px;font-size:13px;text-align:center;cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-secondary);border:none;transition:all 0.15s}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.form-section{display:none}
.form-section.active{display:block}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px}
.field input,.field select{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.field input:focus,.field select:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 2px #E6F1FB}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-submit{width:100%;padding:9px;font-size:14px;font-weight:500;background:#185FA5;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;margin-top:0.25rem}
.btn-submit:hover{background:#0C447C}
.divider{text-align:center;font-size:12px;color:var(--color-text-secondary);margin:1rem 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:var(--color-border-tertiary)}
.divider span{background:var(--color-background-primary);padding:0 10px;position:relative}
.msg{font-size:12px;text-align:center;margin-top:1rem;padding:8px;border-radius:var(--border-radius-md);display:none}
.msg.success{background:var(--color-background-success);color:var(--color-text-success);display:block}
.msg.error{background:var(--color-background-danger);color:var(--color-text-danger);display:block}
.hint{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
</style>

<h2 class="sr-only">Airtel Device Inventory — login and register</h2>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1"/><rect x="11" y="2" width="7" height="7" rx="1"/><rect x="2" y="11" width="7" height="7" rx="1"/><rect x="11" y="11" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="brand-name">Airtel Inventory</div>
      <div class="brand-sub">Device Management System</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login',this)">Sign in</button>
      <button class="tab" onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="sec-login">
      <div class="field">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@airtel.rw">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password">
      </div>
      <button class="btn-submit" onclick="handleLogin()">Sign in</button>
      <div class="msg" id="login-msg"></div>
      <div class="divider"><span>or</span></div>
      <p style="font-size:12px;text-align:center;color:var(--color-text-secondary)">Don't have an account? <span style="color:#185FA5;cursor:pointer" onclick="switchTabByName('register')">Register here</span></p>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="sec-register">
      <div class="field">
        <label>Full name</label>
        <input type="text" id="reg-fullname" placeholder="e.g. Jean Mutabazi">
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="reg-email" placeholder="you@airtel.rw">
      </div>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label>Department</label>
          <select id="reg-department">
            <option value="">Select...</option>
            <option>IT</option>
            <option>Sales</option>
            <option>Finance</option>
            <option>HR</option>
            <option>Operations</option>
            <option>Management</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Role</label>
          <select id="reg-role">
            <option value="">Select...</option>
            <option>Admin</option>
            <option>Manager</option>
            <option>Staff</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:1rem">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Create a password">
        <div class="hint">At least 8 characters</div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat your password">
      </div>
      <button class="btn-submit" onclick="handleRegister()">Create account</button>
      <div class="msg" id="register-msg"></div>
      <div class="divider"><span>or</span></div>
      <p style="font-size:12px;text-align:center;color:var(--color-text-secondary)">Already have an account? <span style="color:#185FA5;cursor:pointer" onclick="switchTabByName('login')">Sign in</span></p>
    </div>
  </div>
</div>

<script>
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
}
function switchTabByName(name) {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  const idx = name === 'login' ? 0 : 1;
  tabs[idx].classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('login-msg','Please fill in all fields','error'); return; }
  try {
    const res = await fetch('http://localhost:8080/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    if (res.ok) {
      showMsg('login-msg', 'Login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } else {
      showMsg('login-msg', 'Invalid email or password', 'error');
    }
  } catch(e) {
    showMsg('login-msg', 'Cannot connect to server. Is Spring Boot running?', 'error');
  }
}
async function handleRegister() {
  const fullName = document.getElementById('reg-fullname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const department = document.getElementById('reg-department').value;
  const role = document.getElementById('reg-role').value;
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  if (!fullName || !email || !department || !role || !password) { showMsg('register-msg','Please fill in all fields','error'); return; }
  if (password.length < 8) { showMsg('register-msg','Password must be at least 8 characters','error'); return; }
  if (password !== confirm) { showMsg('register-msg','Passwords do not match','error'); return; }
  try {
    const res = await fetch('http://localhost:8080/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({fullName, email, department, role, password})
    });
    if (res.ok) {
      showMsg('register-msg', 'Account created! You can now sign in.', 'success');
      setTimeout(() => switchTabByName('login'), 1500);
    } else {
      const err = await res.text();
      showMsg('register-msg', err || 'Registration failed', 'error');
    }
  } catch(e) {
    showMsg('register-msg', 'Cannot connect to server. Is Spring Boot running?', 'error');
  }
}
</script>
