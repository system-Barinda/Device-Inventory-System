spring.application.name=asset-inventory-management-system

# ========================
# DATABASE (Northflank MySQL)
# ========================
# Use the Internal Connection String if your app and DB are in the same Northflank project
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
# 'update' is good for development, 'validate' is better for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========================
# CONNECTION STABILITY
# ========================
# Keeping the pool small is smart for free tiers to avoid memory issues
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# SERVER PORT
# ========================
# Northflank will inject the PORT variable automatically
server.port=${PORT:8080}

# ========================
# LOGGING
# ========================
# Reduced logging for production to keep the console clean
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR

# ========================
# SESSION
# ========================
server.servlet.session.timeout=1h